<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aula Virtual | Inicio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Poppins', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #000000 0%, #044756 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        .hero-card {
            background: rgba(243, 242, 242, 0.563);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3), 0 1px 3px rgba(0, 0, 0, 0.05);
            padding: 3rem 2rem;
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid rgba(233, 233, 239, 0.5);
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #030b10, #1294db);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.164);
        }

        .subtitle {
            font-size: 1.25rem;
            color: #0000006f;
            margin-bottom: 3rem;
            font-weight: 500;
            border-bottom: 2px dashed #00000071;
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        .btn-cursos {
            background: linear-gradient(105deg, #1e3e5c, #2c4863);
            border: none;
            padding: 1rem 2.8rem;
            font-size: 1.6rem;
            font-weight: 600;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 1px;
            text-decoration: none;
            margin-top: 20px;
        }

        .btn-cursos:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 28px -8px rgba(0, 0, 0, 0.3);
            background: linear-gradient(105deg, #1e4a72, #14344c);
        }

        .btn-cursos:active {
            transform: translateY(2px);
        }

        /* Botón para el profesor */
        .btn-profesor {
            background: linear-gradient(105deg, #9e1e1e, #c82333);
            border: none;
            padding: 0.8rem 1.8rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            margin-top: 15px;
        }

        .btn-profesor:hover {
            transform: translateY(-3px);
            background: linear-gradient(105deg, #b82222, #a71d2a);
        }

        .icon-arrow {
            font-size: 1.8rem;
            transition: transform 0.2s;
        }

        .btn-cursos:hover .icon-arrow {
            transform: translateX(6px);
        }

        .edu-illustration {
            margin-top: 3rem;
            opacity: 0.7;
            font-size: 3rem;
            letter-spacing: 12px;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #010406;
        }

        /* Modal de contraseña */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            max-width: 350px;
            width: 90%;
        }

        .modal-content input {
            width: 100%;
            padding: 0.8rem;
            margin: 1rem 0;
            border: 1px solid #ddd;
            border-radius: 0.8rem;
            font-size: 1rem;
        }

        .modal-content button {
            background: #1e3e5c;
            color: white;
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            margin: 0.3rem;
        }

        .modal-content button:hover {
            background: #2c4863;
        }

        .error-msg {
            color: red;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }
            .hero-title {
                font-size: 2.6rem;
            }
            .btn-cursos {
                font-size: 1.3rem;
                padding: 0.8rem 1.5rem;
            }
            .btn-profesor {
                font-size: 1rem;
                padding: 0.6rem 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero-card">
        <h1 class="hero-title">📚 Aula Virtual</h1>
        <h2>Tu espacio de aprendizaje inteligente</h2>
        <h3> </h3>
        
        <a href="cursos.html" class="btn-cursos">
            Cursos disponibles
            <span class="icon-arrow">📚</span>
        </a>

        <!-- Botón para el profesor (protegido) -->
        <button class="btn-profesor" onclick="mostrarModal()">
            👨‍🏫 Panel del Profesor
            <span>🔒</span>
        </button>

        <div class="edu-illustration">
            ✨🎓✨
        </div>
        <div class="footer-note">
            Explora, aprende y crece con la formación académica virtual
        </div>
    </div>
</div>

<!-- Modal de contraseña -->
<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h3>🔐 Acceso Profesor</h3>
        <p>Ingresa la contraseña para acceder al panel</p>
        <input type="password" id="passwordInput" placeholder="Contraseña">
        <div>
            <button onclick="verificarPassword()">Acceder</button>
            <button onclick="cerrarModal()">Cancelar</button>
        </div>
        <div id="errorMsg" class="error-msg"></div>
    </div>
</div>

<script>
    // Cambia esta contraseña por la que quieras
    const CONTRASEÑA_PROFESOR = 'profesor2024';

    function mostrarModal() {
        document.getElementById('passwordModal').style.display = 'flex';
        document.getElementById('passwordInput').value = '';
        document.getElementById('errorMsg').textContent = '';
    }

    function cerrarModal() {
        document.getElementById('passwordModal').style.display = 'none';
    }

    function verificarPassword() {
        const password = document.getElementById('passwordInput').value;
        
        if (password === CONTRASEÑA_PROFESOR) {
            // Contraseña correcta - redirigir al panel
            window.location.href = 'ver-trabajos.html';
        } else {
            document.getElementById('errorMsg').textContent = '❌ Contraseña incorrecta. Acceso denegado.';
        }
    }

    // Cerrar modal si se hace clic fuera de él
    window.onclick = function(event) {
        const modal = document.getElementById('passwordModal');
        if (event.target === modal) {
            cerrarModal();
        }
    }
</script>
</body>
</html>
